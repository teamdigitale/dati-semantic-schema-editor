openapi: 3.0.3
info:
  title: Semantic Score Calculator
  x-summary: API to compute the semantic score of an OpenAPI specification document.
  description: >-
    ## Compute the Semantic Score of an API

    This API computes the semantic score of an OpenAPI specification document.
    It is useful to evaluate the semantic quality of an API. It can be used by
    developers, API consumers or API providers to improve the semantic quality
    of their APIs.
  version: 0.0.2
  contact:
    name: Team Digitale
    url: https://teamdigitale.governo.it
    email: teamdigitale@governo.it
  license:
    name: Apache-2.0
    url: https://opensource.org/licenses/Apache-2.0
  termsOfService: https://schema.gov.it/note-legali
tags:
  - name: Health
    description: Know the health status of the service.
  - name: SemanticScore
    description: Compute the semantic score.
servers:
  - url: http://localhost:3000/api/v1
    description: Local development server
    x-sandbox: true
security:
  # Anyone can use this API.
  - {}
paths:
  /status:
    get:
      operationId: HealthController_getHealth
      description: >-
        The service status.
      parameters: []
      responses:
        "200":
          description: Service is healthy
          headers:
            X-Ratelimit-Limit:
              description: >-
                The maximum number of requests that the user is allowed to make
                per interval of time.
              schema:
                type: integer
                example: 30
            X-Ratelimit-Remaining:
              description: >-
                The number of requests remaining in the current rate limit
                window.
              schema:
                type: integer
                example: 10
            X-Ratelimit-Reset:
              description: >-
                The time at which the current rate limit window resets in
                seconds.
              schema:
                type: integer
                example: 60
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                status: 200
                title: OK
        "429":
          description: Too many requests sent to the server.
          headers:
            X-Ratelimit-Limit:
              description: >-
                The maximum number of requests that the user is allowed to make
                per interval of time.
              schema:
                type: integer
                example: 30
            X-Ratelimit-Remaining:
              description: >-
                The number of requests remaining in the current rate limit
                window.
              schema:
                type: integer
                example: 10
            X-Ratelimit-Reset:
              description: >-
                The time at which the current rate limit window resets in
                seconds.
              schema:
                type: integer
                example: 60
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        default:
          description: |-
            Client or server error during semantic score calculation.
          headers:
            X-Ratelimit-Limit:
              description: >-
                The maximum number of requests that the user is allowed to make
                per interval of time.
              schema:
                type: integer
                example: 30
            X-Ratelimit-Remaining:
              description: >-
                The number of requests remaining in the current rate limit
                window.
              schema:
                type: integer
                example: 10
            X-Ratelimit-Reset:
              description: >-
                The time at which the current rate limit window resets in
                seconds.
              schema:
                type: integer
                example: 60
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
      summary: Health check endpoint
      tags:
        - Health
  /semantic-score:
    post:
      summary: Calculate semantic score for a YAML file
      tags:
        - SemanticScore
      description: |-
        Process an OpenAPI 3.0 specification document containing
        a schema and computes its semantic score
        using the associated REST API Linked Data Keywords.
      operationId: SemanticScoreController_updateSchemaSemanticScore_v1
      parameters: []
      requestBody:
        required: true
        description: |-
          The OpenAPI specification document containing
          a schema annotated with the REST API Linked Data Keywords.
        content:
          multipart/form-data:
            # The file should be in the following formats.
            encoding:
              file:
                contentType: application/yaml, application/json
            schema:
              $ref: "#/components/schemas/CalculateSemanticScoreRequestDTO"
      responses:
        "200":
          description: |-
            The provided OpenAPI specification document has been successfully processed.
            The response will output informations about the global semantic score and the models processed.
          headers:
            X-Ratelimit-Limit:
              description: >-
                The maximum number of requests that the user is allowed to make
                per interval of time.
              schema:
                type: integer
                example: 30
            X-Ratelimit-Remaining:
              description: >-
                The number of requests remaining in the current rate limit
                window.
              schema:
                type: integer
                example: 10
            X-Ratelimit-Reset:
              description: >-
                The time at which the current rate limit window resets in
                seconds.
              schema:
                type: integer
                example: 60
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SemanticScoreResponse"
        "406":
          description: |-
            The provided file is not a valid OpenAPI 3.0 specification document.
          headers:
            X-Ratelimit-Limit:
              description: >-
                The maximum number of requests that the user is allowed to make
                per interval of time.
              schema:
                type: integer
                example: 30
            X-Ratelimit-Remaining:
              description: >-
                The number of requests remaining in the current rate limit
                window.
              schema:
                type: integer
                example: 10
            X-Ratelimit-Reset:
              description: >-
                The time at which the current rate limit window resets in
                seconds.
              schema:
                type: integer
                example: 60
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "413":
          description: |-
            The provided file is too large.
          headers:
            X-Ratelimit-Limit:
              description: >-
                The maximum number of requests that the user is allowed to make
                per interval of time.
              schema:
                type: integer
                example: 30
            X-Ratelimit-Remaining:
              description: >-
                The number of requests remaining in the current rate limit
                window.
              schema:
                type: integer
                example: 10
            X-Ratelimit-Reset:
              description: >-
                The time at which the current rate limit window resets in
                seconds.
              schema:
                type: integer
                example: 60
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "415":
          description: |-
            The provided file has an unsupported media type:
            we only accept application/json and application/yaml.
          headers:
            X-Ratelimit-Limit:
              description: >-
                The maximum number of requests that the user is allowed to make
                per interval of time.
              schema:
                type: integer
                example: 30
            X-Ratelimit-Remaining:
              description: >-
                The number of requests remaining in the current rate limit
                window.
              schema:
                type: integer
                example: 10
            X-Ratelimit-Reset:
              description: >-
                The time at which the current rate limit window resets in
                seconds.
              schema:
                type: integer
                example: 60
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "429":
          description: |-
            Too many requests sent to the server.
          headers:
            X-Ratelimit-Limit:
              description: >-
                The maximum number of requests that the user is allowed to make
                per interval of time.
              schema:
                type: integer
                example: 30
            X-Ratelimit-Remaining:
              description: >-
                The number of requests remaining in the current rate limit
                window.
              schema:
                type: integer
                example: 10
            X-Ratelimit-Reset:
              description: >-
                The time at which the current rate limit window resets in
                seconds.
              schema:
                type: integer
                example: 60
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
        "default":
          description: >-
            Client or server error during semantic score calculation.
          headers:
            X-Ratelimit-Limit:
              description: >-
                The maximum number of requests that the user is allowed to make
                per interval of time.
              schema:
                type: integer
                example: 30
            X-Ratelimit-Remaining:
              description: >-
                The number of requests remaining in the current rate limit
                window.
              schema:
                type: integer
                example: 10
            X-Ratelimit-Reset:
              description: >-
                The time at which the current rate limit window resets in
                seconds.
              schema:
                type: integer
                example: 60
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"
components:
  schemas:
    OASDocument:
      type: string
      description: |-
        An OpenAPI Specification Document
        serialized as YAML or JSON.
      format: binary
      maxLength: 1000000
      minLength: 100
      externalDocs:
        url: https://raw.githubusercontent.com/OAI/spec.openapis.org/refs/heads/main/oas/3.0/schema/2024-10-18
        description: The OpenAPI 3.0 JSON Schema
    CalculateSemanticScoreRequestDTO:
      type: object
      additionalProperties: false
      properties:
        file:
          $ref: "#/components/schemas/OASDocument"
      required:
        - file
    Problem:
      additionalProperties: false
      required:
        - title
      properties:
        detail:
          description: |
            A human readable explanation specific to this occurrence of the
            problem. You MUST NOT expose internal informations, personal
            data or implementation details through this field.
          example: Request took too long to complete.
          type: string
          maxLength: 512
          pattern: ^
        instance:
          description: |
            An absolute URI that identifies the specific occurrence of the problem.
            It may or may not yield further information if dereferenced.
          format: uri
          type: string
          maxLength: 1024
        status:
          description: |
            The HTTP status code generated by the origin server for this occurrence
            of the problem.
          example: 503
          exclusiveMaximum: true
          format: int32
          maximum: 600
          minimum: 100
          type: integer
        title:
          description: |
            A short, summary of the problem type. Written in english and readable
            for engineers (usually not suited for non technical stakeholders and
            not localized); example: Service Unavailable
          type: string
          maxLength: 512
        type:
          default: about:blank
          description: |
            An absolute URI that identifies the problem type.  When dereferenced,
            it SHOULD provide human-readable documentation for the problem type
            (e.g., using HTML).
          example: https://tools.ietf.org/html/rfc7231#section-6.6.4
          format: uri
          type: string
          maxLength: 1024
      type: object
    SemanticScoreResponse:
      type: object
      required:
        - score
        - timestamp
        - sparql_endpoint
        - summary
      properties:
        score:
          type: number
          description: Overall semantic score for the schema (0-1)
          example: 0.75
          minimum: 0
          maximum: 1
        timestamp:
          type: integer
          description: Unix timestamp of when the score was calculated
          example: 1707234567890
        sparql_endpoint:
          type: string
          description: SPARQL endpoint URL used for validation
          example: https://example.com/sparql
          format: uri
        summary:
          $ref: "#/components/schemas/Summary"
    ModelCalculationDetails:
      type: object
      required:
        - model_name
        - score
        - has_annotations
        - valid_properties_paths
        - invalid_properties_paths
      properties:
        model_name:
          type: string
          description: Name of the data model
          example: Country
        score:
          type: number
          description: Semantic score for this model (0-1)
          example: 0.75
          minimum: 0
          maximum: 1
        has_annotations:
          type: boolean
          description: Whether the model is annotated with x-jsonld-context or not.
          example: true
        valid_properties_paths:
          type: array
          description: List of URIs or reserved keywords that are correctly resolved to a semantic property.
          items:
            type: string
          example:
            - "@id"
            - "https://w3id.org/italia/onto/RPO/isCurrentlyPredominantlyCitizen"
        invalid_properties_paths:
          type: array
          description: List of URIs or reserved keywords that cannot be resolved to a semantic property.
          items:
            type: string
          example:
            - "https://w3id.org/italia/onto/RPO/notExistingProperty"
    Summary:
      type: object
      required:
        - raw_models_count
        - positive_score_models_count
        - models_calculation_details
      properties:
        raw_models_count:
          type: integer
          description: Total number of object-type models processed
          example: 10
          minimum: 0
        positive_score_models_count:
          type: integer
          description: Total number of object-type models that have a semantic score greater than 0.
          example: 8
          minimum: 0
        models_calculation_details:
          type: array
          description: Per-model calculation details
          items:
            $ref: "#/components/schemas/ModelCalculationDetails"
